<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96"
     role="img" aria-label="mcp-zen-of-docs logo — enso brushstroke with document icon">
  <title>mcp-zen-of-docs</title>

  <!-- ── Enso brushstroke circle ────────────────────────────────────────
       Traditional zen enso: open at top-right, organic cubic bezier curves
       Start point slightly right-of-top; end point upper-right — gap is the
       deliberate opening that distinguishes an enso from a simple circle.
  ──────────────────────────────────────────────────────────────────────── -->
  <path d="M 51 11
           C 29 8, 9 26, 9 48
           C 9 71, 27 88, 50 88
           C 73 88, 89 70, 89 48
           C 89 32, 81 20, 70 15"
        fill="none"
        stroke="#0ea27a"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- ── Document icon (centered inside the circle) ─────────────────────
       Page with dog-ear top-right corner — the universal "doc" metaphor.
       Center of enso ≈ (48, 48); page is 33×38px centered there.
  ──────────────────────────────────────────────────────────────────────── -->

  <!-- Page outline with dog-ear (notched top-right corner) -->
  <path d="M 31 29 L 55 29 L 64 38 L 64 67 L 31 67 Z"
        fill="none"
        stroke="#0ea27a"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Dog-ear fold line (the triangle crease) -->
  <path d="M 55 29 L 55 38 L 64 38"
        fill="none"
        stroke="#0ea27a"
        stroke-width="1.5"
        stroke-linejoin="round"
        opacity="0.65"/>

  <!-- Text lines inside the document -->
  <line x1="38" y1="46" x2="57" y2="46"
        stroke="#0ea27a" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="52" x2="57" y2="52"
        stroke="#0ea27a" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="58" x2="50" y2="58"
        stroke="#0ea27a" stroke-width="2" stroke-linecap="round"/>

</svg>
