<svg xmlns="http://www.w3.org/2000/svg" width="120" height="20" viewBox="0 0 120 20"
     role="img" aria-label="docs: zen quality">
  <title>docs: zen quality</title>
  <defs>
    <clipPath id="badgeClip">
      <rect width="120" height="20" rx="3"/>
    </clipPath>
  </defs>

  <!-- Two-tone badge: dark forest label + jade value — chapter palette -->
  <g clip-path="url(#badgeClip)">
    <!-- Left segment: chapter dark-forest secondary (#31584d) -->
    <rect x="0"  width="38"  height="20" fill="#31584d"/>
    <!-- Right: jade primary -->
    <rect x="38" width="82"  height="20" fill="#0ea27a"/>
    <!-- Divider shadow -->
    <rect x="37" width="1"   height="20" fill="#0b7a5c" opacity="0.35"/>
  </g>

  <!-- Outer border — chapter panel border tone -->
  <rect x="0.5" y="0.5" width="119" height="19" rx="2.5"
        fill="none" stroke="#b8ddd0" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Left label -->
  <text x="19" y="14" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#edf8f4">docs</text>

  <!-- Right value -->
  <text x="79" y="14" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ffffff">zen quality</text>

</svg>
