<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="The Zen of Documentation — 10 guiding principles">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#130d24"/>
    </linearGradient>
    <linearGradient id="tealViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1de9b6"/>
      <stop offset="100%" style="stop-color:#b39ddb"/>
    </linearGradient>
    <filter id="stoneGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#1de9b6" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="120" y1="0" x2="120" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
    <line x1="840" y1="0" x2="840" y2="420"/>
    <line x1="960" y1="0" x2="960" y2="420"/>
    <line x1="1080" y1="0" x2="1080" y2="420"/>
  </g>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#tealViolet)" opacity="0.7"/>
  <rect x="0" y="0" width="4" height="420" fill="#1de9b6" opacity="0.25"/>

  <!-- Header -->
  <text x="40" y="52" font-family="'JetBrains Mono', monospace" font-size="13" fill="#1de9b6" opacity="0.6" letter-spacing="0.08em">THE ZEN OF DOCUMENTATION</text>
  <text x="1160" y="52" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#8b949e" opacity="0.5">10 PRINCIPLES</text>

  <!-- Principle stones — row 1 (1-5) -->
  <!-- 1. Clarity -->
  <rect x="40" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#1de9b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#stoneGlow)"/>
  <text x="90" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1de9b6" opacity="0.7">1</text>
  <text x="90" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Clarity</text>
  <text x="90" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">over cleverness</text>

  <!-- 2. Structure -->
  <rect x="160" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#1de9b6" stroke-width="1.5" stroke-opacity="0.6" filter="url(#stoneGlow)"/>
  <text x="210" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1de9b6" opacity="0.7">2</text>
  <text x="210" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Structure</text>
  <text x="210" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">reveals intent</text>

  <!-- 3. Primitives -->
  <rect x="280" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#7c4dff" stroke-width="1.5" stroke-opacity="0.6" filter="url(#stoneGlow)"/>
  <text x="330" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#b39ddb" opacity="0.7">3</text>
  <text x="330" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Primitives</text>
  <text x="330" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">universal</text>

  <!-- 4. Beauty -->
  <rect x="400" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#7c4dff" stroke-width="1.5" stroke-opacity="0.6" filter="url(#stoneGlow)"/>
  <text x="450" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#b39ddb" opacity="0.7">4</text>
  <text x="450" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Beauty</text>
  <text x="450" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">is functional</text>

  <!-- 5. One Page -->
  <rect x="520" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#b39ddb" stroke-width="1.5" stroke-opacity="0.5" filter="url(#stoneGlow)"/>
  <text x="570" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#b39ddb" opacity="0.6">5</text>
  <text x="570" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">One Page</text>
  <text x="570" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">one idea</text>

  <!-- Principle stones — row 2 (6-10) -->
  <!-- 6. Navigation -->
  <rect x="640" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#b39ddb" stroke-width="1.5" stroke-opacity="0.5" filter="url(#stoneGlow)"/>
  <text x="690" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#b39ddb" opacity="0.6">6</text>
  <text x="690" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Navigation</text>
  <text x="690" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">is a contract</text>

  <!-- 7. Frontmatter -->
  <rect x="760" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#7c4dff" stroke-width="1.5" stroke-opacity="0.5" filter="url(#stoneGlow)"/>
  <text x="810" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#7c4dff" opacity="0.7">7</text>
  <text x="810" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Frontmatter</text>
  <text x="810" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">metadata</text>

  <!-- 8. Code Examples -->
  <rect x="880" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#7c4dff" stroke-width="1.5" stroke-opacity="0.5" filter="url(#stoneGlow)"/>
  <text x="930" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#7c4dff" opacity="0.7">8</text>
  <text x="930" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Code Examples</text>
  <text x="930" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">must run</text>

  <!-- 9. Admonitions -->
  <rect x="1000" y="80" width="100" height="80" rx="10" fill="#0f1923" stroke="#1de9b6" stroke-width="1.5" stroke-opacity="0.4" filter="url(#stoneGlow)"/>
  <text x="1050" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1de9b6" opacity="0.5">9</text>
  <text x="1050" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Admonitions</text>
  <text x="1050" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">earn their place</text>

  <!-- 10. Product -->
  <rect x="1120" y="80" width="70" height="80" rx="10" fill="#0f1923" stroke="#1de9b6" stroke-width="1.5" stroke-opacity="0.4" filter="url(#stoneGlow)"/>
  <text x="1155" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#1de9b6" opacity="0.5">10</text>
  <text x="1155" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">Docs</text>
  <text x="1155" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">is a product</text>

  <!-- Connecting line between stones -->
  <line x1="40" y1="197" x2="1190" y2="197" stroke="url(#tealViolet)" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="6,4"/>

  <!-- Summary section -->
  <text x="40" y="240" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#c9d1d9">Write documentation the way you write production code:</text>
  <text x="40" y="265" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e">with intent, with tests, and with the reader as your</text>
  <text x="40" y="283" font-family="system-ui, sans-serif" font-size="14" fill="#8b949e">first-class user.</text>

  <!-- Kanji for zen aesthetic -->
  <text x="1160" y="360" text-anchor="end" font-family="serif" font-size="64" fill="#1de9b6" opacity="0.06">禅</text>

  <!-- Framework chips -->
  <rect x="40" y="310" width="90" height="24" rx="12" fill="#1de9b6" fill-opacity="0.1" stroke="#1de9b6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="85" y="325" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1de9b6">Zensical</text>
  <rect x="145" y="310" width="100" height="24" rx="12" fill="#7c4dff" fill-opacity="0.1" stroke="#7c4dff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="195" y="325" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b39ddb">Docusaurus</text>
  <rect x="260" y="310" width="84" height="24" rx="12" fill="#7c4dff" fill-opacity="0.1" stroke="#7c4dff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="302" y="325" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b39ddb">VitePress</text>
  <rect x="359" y="310" width="80" height="24" rx="12" fill="#b39ddb" fill-opacity="0.1" stroke="#b39ddb" stroke-width="1" stroke-opacity="0.3"/>
  <text x="399" y="325" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b39ddb">Starlight</text>

  <!-- Bottom URL -->
  <text x="40" y="395" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e" opacity="0.4">github.com/Anselmoo/mcp-zen-of-docs</text>
</svg>
