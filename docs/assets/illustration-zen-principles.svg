<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="zenPrinciplesTitle">
  <title id="zenPrinciplesTitle">Zen of Documentation — Ten Principles</title>
  <desc>A karesansui dry-landscape garden viewed through a scroll panel: fine raked-sand horizon lines fill the interior, concentric elliptical grooves radiate from four stone clusters, and ten irregular stepping stones of varying size carry the ten principles of the Zen of Documentation. Distant mountain peaks, layered cedar-forest ridges, and three bands of drifting mist complete the jade-and-parchment landscape.</desc>
  <defs>
    <!-- Canonical chapter palette — IDs prefixed zp -->
    <linearGradient id="zpSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#edf8f4"/>
      <stop offset="58%"  stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#faf6ee"/>
    </linearGradient>
    <linearGradient id="zpPeak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#daeee6"/>
      <stop offset="100%" stop-color="#c2dfd4"/>
    </linearGradient>
    <linearGradient id="zpRidgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d5ebe3"/>
      <stop offset="100%" stop-color="#bfddd1"/>
    </linearGradient>
    <linearGradient id="zpRidgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b7dbcd"/>
      <stop offset="100%" stop-color="#8fc7b5"/>
    </linearGradient>
    <linearGradient id="zpRidgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#31584d"/>
      <stop offset="100%" stop-color="#17332e"/>
    </linearGradient>
    <linearGradient id="zpMist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#f5fbf8" stop-opacity="0.76"/>
      <stop offset="54%"  stop-color="#edf8f4" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="zpMist2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#f0f9f5" stop-opacity="0.62"/>
      <stop offset="70%"  stop-color="#e8f5f0" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Stone radial gradient — gives flat ellipses a subtle pebble quality -->
    <radialGradient id="zpStone" cx="36%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#f5faf8"/>
      <stop offset="100%" stop-color="#dce8e3"/>
    </radialGradient>
    <!-- Anchor stone — slightly warmer, suggesting a weathered garden rock -->
    <radialGradient id="zpAnchor" cx="34%" cy="30%" r="64%">
      <stop offset="0%"   stop-color="#f5f9f7"/>
      <stop offset="100%" stop-color="#d8e6e1"/>
    </radialGradient>
    <filter id="zpShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14"
                    flood-color="#17332e" flood-opacity="0.10"/>
    </filter>
    <filter id="zpHaze" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>
    <!-- Clip panel interior -->
    <clipPath id="zpPanelClip">
      <rect x="28" y="74" width="1144" height="164" rx="32"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="420" rx="30" fill="url(#zpSky)"/>

  <!-- Sun disc + halo — upper-right -->
  <circle cx="1085" cy="90" r="62" fill="#cbe8dc" opacity="0.30"/>
  <circle cx="1085" cy="90" r="36" fill="#e4f5ed" opacity="0.96"/>

  <!-- Distant mountain peaks — two peaks, asymmetric placement -->
  <g filter="url(#zpHaze)" opacity="0.56">
    <path d="M 90,278 L 245,148 L 400,278 Z" fill="url(#zpPeak)"/>
    <path d="M 178,174 L 245,148 L 312,178 L 334,228 L 156,228 Z" fill="#eef6f2" opacity="0.88"/>
    <path d="M 580,278 L 720,145 L 860,278 Z" fill="url(#zpPeak)" opacity="0.84"/>
    <path d="M 682,170 L 720,145 L 758,174 L 776,222 L 664,222 Z" fill="#eef6f2" opacity="0.82"/>
  </g>

  <!-- Ridge bands -->
  <path d="M0 281 C133 249,272 249,423 281 C588 315,752 315,920 281 C1033 257,1128 254,1200 265 L1200 420 L0 420 Z"
        fill="url(#zpRidgeFar)"/>
  <path d="M0 312 C165 281,308 283,473 317 C638 351,793 351,950 312 C1055 286,1140 288,1200 296 L1200 420 L0 420 Z"
        fill="url(#zpRidgeMid)" opacity="0.92"/>
  <path d="M0 357 C173 330,343 333,508 367 C675 401,850 398,1200 349 L1200 420 L0 420 Z"
        fill="url(#zpRidgeNear)"/>

  <!-- Cedar forest on near ridge -->
  <g fill="#0e2420">
    <polygon points="52,362  44,336  60,336" opacity="0.96"/>
    <polygon points="52,348  40,318  64,318" opacity="0.96"/>
    <polygon points="52,332  34,302  70,302" opacity="0.96"/>
    <rect x="50" y="362" width="4" height="8" rx="1" opacity="0.96"/>
  </g>
  <g fill="#17332e">
    <polygon points="104,348  96,325  112,325" opacity="0.90"/>
    <polygon points="104,336  93,311  115,311" opacity="0.90"/>
    <polygon points="104,321  87,294  121,294" opacity="0.90"/>
    <rect x="102" y="348" width="4" height="7" rx="1" opacity="0.90"/>
  </g>
  <g fill="#1a3830">
    <polygon points="156,342 148,320  164,320" opacity="0.84"/>
    <polygon points="156,330 145,307  167,307" opacity="0.84"/>
    <polygon points="156,315 139,290  173,290" opacity="0.84"/>
    <rect x="154" y="342" width="4" height="8" rx="1" opacity="0.84"/>
  </g>
  <g fill="#17332e">
    <polygon points="214,338 205,314  223,314" opacity="0.88"/>
    <polygon points="214,325 203,300  225,300" opacity="0.88"/>
    <polygon points="214,310 196,284  232,284" opacity="0.88"/>
    <rect x="212" y="338" width="4" height="9" rx="1" opacity="0.88"/>
  </g>
  <g fill="#1d3d35">
    <polygon points="380,350 372,329  388,329" opacity="0.74"/>
    <polygon points="380,337 369,313  391,313" opacity="0.74"/>
    <polygon points="380,322 363,295  397,295" opacity="0.74"/>
    <rect x="378" y="350" width="4" height="8" rx="1" opacity="0.74"/>
  </g>
  <g fill="#17332e">
    <polygon points="450,357 442,335  458,335" opacity="0.78"/>
    <polygon points="450,344 440,319  460,319" opacity="0.78"/>
    <polygon points="450,329 433,302  467,302" opacity="0.78"/>
    <rect x="448" y="357" width="4" height="7" rx="1" opacity="0.78"/>
  </g>
  <g fill="#17332e">
    <polygon points="760,378 752,356  768,356" opacity="0.86"/>
    <polygon points="760,364 750,340  770,340" opacity="0.86"/>
    <polygon points="760,349 744,321  776,321" opacity="0.86"/>
    <rect x="758" y="378" width="4" height="9" rx="1" opacity="0.86"/>
  </g>
  <g fill="#1a3830">
    <polygon points="834,376 826,355  842,355" opacity="0.80"/>
    <polygon points="834,363 823,339  845,339" opacity="0.80"/>
    <polygon points="834,348 817,320  851,320" opacity="0.80"/>
    <rect x="832" y="376" width="4" height="8" rx="1" opacity="0.80"/>
  </g>
  <g fill="#17332e">
    <polygon points="956,366 948,346  964,346" opacity="0.82"/>
    <polygon points="956,353 946,330  966,330" opacity="0.82"/>
    <polygon points="956,338 940,311  972,311" opacity="0.82"/>
    <rect x="954" y="366" width="4" height="8" rx="1" opacity="0.82"/>
  </g>
  <g fill="#1a3830">
    <polygon points="1028,358 1020,338 1036,338" opacity="0.76"/>
    <polygon points="1028,345 1018,322 1038,322" opacity="0.76"/>
    <polygon points="1028,330 1012,303 1044,303" opacity="0.76"/>
    <rect x="1026" y="358" width="4" height="7" rx="1" opacity="0.76"/>
  </g>
  <g fill="#17332e">
    <polygon points="1100,351 1092,331 1108,331" opacity="0.80"/>
    <polygon points="1100,338 1090,315 1110,315" opacity="0.80"/>
    <polygon points="1100,324 1084,297 1116,297" opacity="0.80"/>
    <rect x="1098" y="351" width="4" height="8" rx="1" opacity="0.80"/>
  </g>
  <g fill="#1a3830">
    <polygon points="1164,350 1156,331 1172,331" opacity="0.68"/>
    <polygon points="1164,337 1154,315 1174,315" opacity="0.68"/>
    <polygon points="1164,323 1149,297 1179,297" opacity="0.68"/>
    <rect x="1162" y="350" width="4" height="8" rx="1" opacity="0.68"/>
  </g>

  <!-- Mist — three atmospheric bands -->
  <path d="M0 288 C180 267,400 272,620 294 C820 317,1000 312,1200 280"
        fill="none" stroke="url(#zpMist)" stroke-width="24" stroke-linecap="round" opacity="0.92"/>
  <path d="M0 328 C220 310,460 316,680 341 C880 362,1040 357,1200 332"
        fill="none" stroke="url(#zpMist)" stroke-width="20" stroke-linecap="round" opacity="0.84"/>
  <path d="M0 354 C170 344,360 348,540 366 C720 384,890 380,1200 357"
        fill="none" stroke="url(#zpMist2)" stroke-width="16" stroke-linecap="round" opacity="0.72"/>

  <!-- Caption labels -->
  <text x="40" y="50"
        font-family="'JetBrains Mono','Fira Code',monospace"
        font-size="12" fill="#0b7a5c" opacity="0.72" letter-spacing="0.08em">THE ZEN OF DOCUMENTATION</text>
  <text x="40" y="65"
        font-family="'JetBrains Mono','Fira Code',monospace"
        font-size="10" fill="#31584d" opacity="0.52" letter-spacing="0.06em">TEN PRINCIPLES</text>

  <!-- Karesansui garden panel -->
  <g filter="url(#zpShadow)">
    <!-- Panel backing -->
    <rect x="28" y="74" width="1144" height="164" rx="32"
          fill="#ffffff" stroke="#b8ddd0" stroke-width="4"/>

    <g clip-path="url(#zpPanelClip)">

      <!-- ── Raked sand — fine horizontal wave lines fill the garden floor ── -->
      <g fill="none" stroke="#cfe4db" stroke-width="1.5" opacity="0.52">
        <path d="M28,87  C220,83  440,89  660,85  C880,81  1060,86  1172,84"/>
        <path d="M28,98  C220,94  440,100 660,96  C880,92  1060,97  1172,95"/>
        <path d="M28,109 C220,105 440,111 660,107 C880,103 1060,108 1172,106"/>
        <path d="M28,120 C220,116 440,122 660,118 C880,114 1060,119 1172,117"/>
        <path d="M28,131 C220,127 440,133 660,129 C880,125 1060,130 1172,128"/>
        <path d="M28,142 C220,138 440,144 660,140 C880,136 1060,141 1172,139"/>
        <path d="M28,153 C220,149 440,155 660,151 C880,147 1060,152 1172,150"/>
        <path d="M28,164 C220,160 440,166 660,162 C880,158 1060,163 1172,161"/>
        <path d="M28,175 C220,171 440,177 660,173 C880,169 1060,174 1172,172"/>
        <path d="M28,186 C220,182 440,188 660,184 C880,180 1060,185 1172,183"/>
        <path d="M28,197 C220,193 440,199 660,195 C880,191 1060,196 1172,194"/>
        <path d="M28,208 C220,204 440,210 660,206 C880,202 1060,207 1172,205"/>
        <path d="M28,219 C220,215 440,221 660,217 C880,213 1060,218 1172,216"/>
        <path d="M28,230 C220,226 440,232 660,228 C880,224 1060,229 1172,227"/>
      </g>

      <!-- ── Concentric raking arcs around stone clusters ──
           These disrupt the straight sand lines, evoking the real karesansui
           technique of raking circular grooves around each stone group. -->

      <!-- Cluster A arcs (centre ≈ 162, 155) -->
      <ellipse cx="162" cy="155" rx="58"  ry="40"  fill="none" stroke="#c8ddd6" stroke-width="1.8" opacity="0.60"/>
      <ellipse cx="162" cy="155" rx="76"  ry="53"  fill="none" stroke="#c8ddd6" stroke-width="1.5" opacity="0.48"/>
      <ellipse cx="162" cy="155" rx="94"  ry="65"  fill="none" stroke="#c8ddd6" stroke-width="1.2" opacity="0.36"/>

      <!-- Cluster B arcs (centre ≈ 354, 130) -->
      <ellipse cx="354" cy="130" rx="52"  ry="36"  fill="none" stroke="#c8ddd6" stroke-width="1.8" opacity="0.58"/>
      <ellipse cx="354" cy="130" rx="70"  ry="49"  fill="none" stroke="#c8ddd6" stroke-width="1.5" opacity="0.44"/>

      <!-- Cluster C arcs (centre ≈ 578, 146) -->
      <ellipse cx="578" cy="146" rx="62"  ry="44"  fill="none" stroke="#c8ddd6" stroke-width="1.8" opacity="0.58"/>
      <ellipse cx="578" cy="146" rx="82"  ry="58"  fill="none" stroke="#c8ddd6" stroke-width="1.5" opacity="0.45"/>
      <ellipse cx="578" cy="146" rx="102" ry="72"  fill="none" stroke="#c8ddd6" stroke-width="1.2" opacity="0.32"/>

      <!-- Cluster D arcs (centre ≈ 812, 132) -->
      <ellipse cx="812" cy="132" rx="58"  ry="40"  fill="none" stroke="#c8ddd6" stroke-width="1.8" opacity="0.56"/>
      <ellipse cx="812" cy="132" rx="78"  ry="55"  fill="none" stroke="#c8ddd6" stroke-width="1.5" opacity="0.42"/>

      <!-- ── Scattered fine gravel in the eastern void (right of last stone) ──
           The empty raked sand to the right of x≈900 is itself a zen element.
           A few tiny irregular pebbles suggest depth without filling the void. -->
      <circle cx="940"  cy="126" r="3.2" fill="#c0d8d0" opacity="0.44"/>
      <circle cx="968"  cy="148" r="2.2" fill="#c0d8d0" opacity="0.38"/>
      <circle cx="1002" cy="116" r="3.8" fill="#c0d8d0" opacity="0.36"/>
      <circle cx="1032" cy="157" r="2.5" fill="#c0d8d0" opacity="0.40"/>
      <circle cx="1064" cy="132" r="3.0" fill="#c0d8d0" opacity="0.34"/>
      <circle cx="1096" cy="148" r="2.0" fill="#c0d8d0" opacity="0.32"/>
      <circle cx="1126" cy="120" r="3.5" fill="#c0d8d0" opacity="0.36"/>
      <circle cx="1154" cy="140" r="2.2" fill="#c0d8d0" opacity="0.30"/>

      <!-- ── Ten garden stones — genuine asymmetric karesansui arrangement ──
           Stones: varying sizes, slight rotation transforms, no connecting line.
           Cluster A (3): Clarity, Structure, Primitives  — left
           Cluster B (2): Beauty, One Page              — left-centre
           Cluster C (3): Navigation, Frontmatter, Code — centre
           Cluster D (2): Admonitions, Docs             — right-centre
           Eastern void remains open (≈ x 920–1172). -->

      <!-- Cluster A — three stones, leftmost group -->

      <!-- Clarity — anchor stone, largest, slightly tilted -8° -->
      <ellipse cx="88"  cy="158" rx="29" ry="19" fill="url(#zpAnchor)" stroke="#8fcbbf" stroke-width="3.5"
               transform="rotate(-8,88,158)"/>
      <text x="88"  y="183" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="700" fill="#17332e">Clarity</text>

      <!-- Structure — smaller, tilted +6° -->
      <ellipse cx="162" cy="128" rx="21" ry="13" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="3.0"
               transform="rotate(6,162,128)"/>
      <text x="162" y="148" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Structure</text>

      <!-- Primitives — medium, tilted -11° -->
      <ellipse cx="218" cy="170" rx="25" ry="16" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="3.0"
               transform="rotate(-11,218,170)"/>
      <text x="218" y="193" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Primitives</text>

      <!-- Cluster B — two stones, gap before them reinforces rhythm -->

      <!-- Beauty — medium, tilted +9° -->
      <ellipse cx="324" cy="146" rx="23" ry="14" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="3.0"
               transform="rotate(9,324,146)"/>
      <text x="324" y="167" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Beauty</text>

      <!-- One Page — smaller, high, tilted -5° -->
      <ellipse cx="388" cy="110" rx="19" ry="12" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="2.8"
               transform="rotate(-5,388,110)"/>
      <text x="388" y="129" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">One Page</text>

      <!-- Cluster C — three stones, widest cluster -->

      <!-- Navigation — medium-large, tilted +10° -->
      <ellipse cx="508" cy="130" rx="25" ry="16" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="3.0"
               transform="rotate(10,508,130)"/>
      <text x="508" y="152" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Navigation</text>

      <!-- Frontmatter — medium, low, tilted -7° -->
      <ellipse cx="590" cy="168" rx="22" ry="14" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="2.8"
               transform="rotate(-7,590,168)"/>
      <text x="590" y="189" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Frontmatter</text>

      <!-- Code — small, high, tilted +13° -->
      <ellipse cx="650" cy="118" rx="19" ry="12" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="2.8"
               transform="rotate(13,650,118)"/>
      <text x="650" y="137" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Code</text>

      <!-- Cluster D — two stones, then open void to the east -->

      <!-- Admonitions — larger stone, anchor of this cluster, tilted -6° -->
      <ellipse cx="762" cy="148" rx="28" ry="18" fill="url(#zpAnchor)" stroke="#8fcbbf" stroke-width="3.5"
               transform="rotate(-6,762,148)"/>
      <text x="762" y="173" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="700" fill="#17332e">Admonitions</text>

      <!-- Docs — medium, high, tilted +8° — last stone before the void -->
      <ellipse cx="858" cy="112" rx="23" ry="15" fill="url(#zpStone)" stroke="#9fd0bf" stroke-width="3.0"
               transform="rotate(8,858,112)"/>
      <text x="858" y="133" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">Docs</text>

    </g>
  </g>

</svg>
