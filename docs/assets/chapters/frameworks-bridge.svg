<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-label="Frameworks chapter illustration showing four framework nodes connected across a bridge line">
  <title>Frameworks chapter illustration</title>
  <desc>Four framework islands are connected by a shared jade bridge above layered ridges and mist, echoing the visual logic of the hero image.</desc>
  <defs>
    <linearGradient id="panelSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf8f4"/>
      <stop offset="58%" stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#faf6ee"/>
    </linearGradient>
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d5ebe3"/>
      <stop offset="100%" stop-color="#bfddd1"/>
    </linearGradient>
    <linearGradient id="ridgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7dbcd"/>
      <stop offset="100%" stop-color="#8fc7b5"/>
    </linearGradient>
    <linearGradient id="ridgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#31584d"/>
      <stop offset="100%" stop-color="#17332e"/>
    </linearGradient>
    <linearGradient id="mistBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="18%" stop-color="#f5fbf8" stop-opacity="0.68"/>
      <stop offset="54%" stop-color="#edf8f4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#17332e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="30" fill="url(#panelSky)"/>
  <circle cx="748" cy="86" r="34" fill="#e4f5ed" opacity="0.96"/>
  <circle cx="748" cy="86" r="58" fill="#cbe8dc" opacity="0.34"/>
  <path d="M0 214 C106 190, 218 190, 338 214 C470 240, 602 240, 736 214 C826 196, 902 194, 960 202 L960 320 L0 320 Z" fill="url(#ridgeFar)"/>
  <path d="M0 238 C132 214, 246 216, 378 242 C510 268, 634 268, 760 238 C844 218, 912 220, 960 226 L960 320 L0 320 Z" fill="url(#ridgeMid)" opacity="0.92"/>
  <path d="M0 272 C138 252, 274 254, 406 280 C540 306, 680 304, 960 266 L960 320 L0 320 Z" fill="url(#ridgeNear)"/>
  <path d="M52 226 C192 212, 312 214, 432 236 C552 258, 700 256, 876 222" fill="none" stroke="url(#mistBand)" stroke-width="18" stroke-linecap="round"/>
  <path d="M82 258 C220 248, 360 252, 496 274 C642 296, 768 294, 896 266" fill="none" stroke="url(#mistBand)" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
  <g filter="url(#softShadow)">
    <path d="M126 182 C234 160, 350 160, 462 182 C576 204, 690 204, 826 178" fill="none" stroke="#0b7a5c" stroke-width="6" stroke-linecap="round"/>
    <g fill="#ffffff" stroke="#9fd0bf" stroke-width="4">
      <circle cx="188" cy="182" r="38"/>
      <circle cx="398" cy="176" r="38"/>
      <circle cx="612" cy="188" r="38"/>
      <circle cx="808" cy="176" r="38"/>
    </g>
    <g fill="#0ea27a">
      <rect x="172" y="166" width="32" height="32" rx="8"/>
      <path d="M382 194h32v-36h-32z"/>
      <path d="M596 198h34l-17-30z"/>
      <circle cx="808" cy="176" r="15"/>
    </g>
    <path d="M126 134 C238 116, 342 118, 458 136 C576 154, 702 152, 832 132" fill="none" stroke="#3fd9a8" stroke-width="4" stroke-linecap="round" opacity="0.42"/>
  </g>
</svg>
