<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120"
     role="img" aria-label="mcp-zen-of-docs page header banner">
  <title>mcp-zen-of-docs header banner</title>
  <defs>
    <!-- Top slice of chapter panelSky — same stops, shows the uppermost jade-tinted zone -->
    <linearGradient id="headerSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#edf8f4"/>
      <stop offset="100%" stop-color="#f7fbf8"/>
    </linearGradient>
  </defs>

  <!-- Light chapter sky slice -->
  <rect width="1200" height="120" fill="url(#headerSky)"/>

  <!-- Enso watermark — large circle anchored upper-right, cropped by viewBox.
       Chapter motif: jade stroke at very low opacity over the sky. -->
  <path d="M 1115 -30
           C 1165 -30, 1205 10, 1205 60
           C 1205 110, 1165 150, 1115 150
           C 1065 150, 1025 110, 1025 60
           C 1025 10, 1060 -28, 1105 -30"
        fill="none" stroke="#0ea27a" stroke-width="16"
        stroke-linecap="round" opacity="0.07"/>

  <!-- Bottom accent line: chapter near-ridge dark forest tone -->
  <rect x="0" y="118" width="1200" height="2" fill="#b8ddd0"/>
</svg>
