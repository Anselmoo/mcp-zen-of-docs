<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     role="img" aria-labelledby="prompt-title">
  <title id="prompt-title">Prompt icon</title>
  <defs>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#17332e" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#f7fbf8" filter="url(#iconShadow)"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#b8ddd0" stroke-width="1.5"/>
  <!-- Terminal frame (white card inside, matching chapter node rings) -->
  <rect x="10" y="14" width="44" height="36" rx="7" fill="#ffffff" stroke="#9fd0bf" stroke-width="2"/>
  <!-- Traffic-light dots (top bar) -->
  <circle cx="20" cy="23" r="3" fill="#3fd9a8" opacity="0.8"/>
  <circle cx="29" cy="23" r="3" fill="#b8ddd0"/>
  <circle cx="38" cy="23" r="3" fill="#b8ddd0"/>
  <!-- Chevron prompt -->
  <path d="M16 36 L23 41 L16 46" fill="none" stroke="#0b7a5c"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Active cursor line -->
  <line x1="27" y1="41" x2="44" y2="41" stroke="#0ea27a" stroke-width="2" stroke-linecap="round"/>
</svg>
