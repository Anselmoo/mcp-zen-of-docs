<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     role="img" aria-labelledby="resource-title">
  <title id="resource-title">Resource icon</title>
  <defs>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#17332e" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#f7fbf8" filter="url(#iconShadow)"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#b8ddd0" stroke-width="1.5"/>
  <!-- Document body (white card) -->
  <rect x="14" y="10" width="28" height="36" rx="5" fill="#ffffff" stroke="#9fd0bf" stroke-width="2"/>
  <!-- Folded corner tab -->
  <path d="M34 10 L42 18 L34 18 Z" fill="#edf8f4"/>
  <path d="M34 10 L34 18 L42 18" fill="none" stroke="#9fd0bf" stroke-width="2"/>
  <!-- Content lines (dark jade primary, mint tertiary) -->
  <line x1="19" y1="25" x2="35" y2="25" stroke="#0b7a5c" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="31" x2="35" y2="31" stroke="#0b7a5c" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="37" x2="29" y2="37" stroke="#3fd9a8" stroke-width="2"
        stroke-linecap="round" opacity="0.7"/>
</svg>
