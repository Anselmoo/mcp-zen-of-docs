<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     role="img" aria-labelledby="zen-title">
  <title id="zen-title">mcp-zen-of-docs icon</title>
  <defs>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#17332e" flood-opacity="0.10"/>
    </filter>
  </defs>
  <!-- Card background: chapter sky tint + soft jade border -->
  <rect width="64" height="64" rx="12" fill="#f7fbf8" filter="url(#iconShadow)"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#b8ddd0" stroke-width="1.5"/>
  <!-- Enso brushstroke — open at top-right (brand mark) -->
  <path d="M32 10 C43 10,54 21,54 32 C54 43,43 54,32 54 C21 54,10 43,10 32 C10 21,21 10,30 10"
        fill="none" stroke="#0ea27a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Doc lines inside enso -->
  <line x1="23" y1="30" x2="41" y2="30" stroke="#0b7a5c" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="36" x2="41" y2="36" stroke="#0b7a5c" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="42" x2="34" y2="42" stroke="#3fd9a8" stroke-width="2"
        stroke-linecap="round" opacity="0.7"/>
</svg>
