<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64"
     role="img" aria-labelledby="onboarding-title">
  <title id="onboarding-title">Onboarding tool icon</title>
  <defs>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#17332e" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#f7fbf8" filter="url(#iconShadow)"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#b8ddd0" stroke-width="1.5"/>
  <!-- Primary path (dark jade, like quickstart-path main route) -->
  <path d="M12 50 C18 42,24 38,32 38 C40 38,46 30,52 20"
        fill="none" stroke="#0b7a5c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ghost dashed secondary (mint, like quickstart-path ghost) -->
  <path d="M10 52 C16 44,22 40,32 40 C42 40,48 32,54 22"
        fill="none" stroke="#3fd9a8" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="4 6" opacity="0.5"/>
  <!-- Waypoints: origin (muted), midpoint (jade ring), destination (filled jade) -->
  <circle cx="12" cy="50" r="5" fill="#ffffff" stroke="#9fd0bf" stroke-width="2"/>
  <circle cx="32" cy="38" r="5" fill="#ffffff" stroke="#0ea27a" stroke-width="2"/>
  <circle cx="52" cy="20" r="6" fill="#0ea27a"/>
  <circle cx="52" cy="20" r="3" fill="#ffffff" opacity="0.6"/>
</svg>
