    <polygon points="48,348  36,318  60,318" opacity="0.96"/>
    <polygon points="48,332  30,302  66,302" opacity="0.96"/>
    <rect x="46" y="362" width="4" height="8" rx="1" opacity="0.96"/>
  </g>
  <g fill="#17332e">
    <polygon points="96,350  88,326  104,326" opacity="0.90"/>
    <polygon points="96,338  85,312  107,312" opacity="0.90"/>
    <polygon points="96,323  78,296  114,296" opacity="0.90"/>
    <rect x="94" y="350" width="4" height="7" rx="1" opacity="0.90"/>
  </g>
  <g fill="#0e2420">
    <polygon points="144,343 136,320  152,320" opacity="0.86"/>
    <polygon points="144,331 133,308  155,308" opacity="0.86"/>
    <polygon points="144,317 127,292  161,292" opacity="0.86"/>
    <rect x="142" y="343" width="4" height="8" rx="1" opacity="0.86"/>
  </g>
  <g fill="#1a3830">
    <polygon points="194,340 186,317  202,317" opacity="0.82"/>
    <polygon points="194,328 184,305  204,305" opacity="0.82"/>
    <polygon points="194,314 177,289  211,289" opacity="0.82"/>
    <rect x="192" y="340" width="4" height="7" rx="1" opacity="0.82"/>
  </g>
  <g fill="#17332e">
    <polygon points="244,337 235,312  253,312" opacity="0.90"/>
    <polygon points="244,324 232,298  256,298" opacity="0.90"/>
    <polygon points="244,309 226,282  262,282" opacity="0.90"/>
    <rect x="242" y="337" width="4" height="9" rx="1" opacity="0.90"/>
  </g>
  <g fill="#1d3d35">
    <polygon points="390,348 383,328  397,328" opacity="0.74"/>
    <polygon points="390,336 379,313  401,313" opacity="0.74"/>
    <polygon points="390,322 373,296  407,296" opacity="0.74"/>
    <rect x="388" y="348" width="4" height="8" rx="1" opacity="0.74"/>
  </g>
  <g fill="#17332e">
    <polygon points="452,355 444,334  460,334" opacity="0.78"/>
    <polygon points="452,342 441,318  463,318" opacity="0.78"/>
    <polygon points="452,327 436,300  468,300" opacity="0.78"/>
    <rect x="450" y="355" width="4" height="7" rx="1" opacity="0.78"/>
  </g>
  <g fill="#17332e">
    <polygon points="764,376 756,354  772,354" opacity="0.88"/>
    <polygon points="764,362 753,338  775,338" opacity="0.88"/>
    <polygon points="764,347 748,320  780,320" opacity="0.88"/>
    <rect x="762" y="376" width="4" height="9" rx="1" opacity="0.88"/>
  </g>
  <g fill="#1a3830">
    <polygon points="828,376 820,355  836,355" opacity="0.82"/>
    <polygon points="828,363 818,339  838,339" opacity="0.82"/>
    <polygon points="828,348 812,320  844,320" opacity="0.82"/>
    <rect x="826" y="376" width="4" height="8" rx="1" opacity="0.82"/>
  </g>
  <g fill="#0e2420">
    <polygon points="890,373 882,353  898,353" opacity="0.78"/>
    <polygon points="890,360 880,336  900,336" opacity="0.78"/>
    <polygon points="890,345 874,318  906,318" opacity="0.78"/>
    <rect x="888" y="373" width="4" height="9" rx="1" opacity="0.78"/>
  </g>
  <g fill="#17332e">
    <polygon points="954,366 946,346  962,346" opacity="0.84"/>
    <polygon points="954,353 944,330  964,330" opacity="0.84"/>
    <polygon points="954,338 938,311  970,311" opacity="0.84"/>
    <rect x="952" y="366" width="4" height="8" rx="1" opacity="0.84"/>
  </g>
  <g fill="#1a3830">
    <polygon points="1026,358 1018,338 1034,338" opacity="0.76"/>
    <polygon points="1026,345 1016,322 1036,322" opacity="0.76"/>
    <polygon points="1026,330 1010,303 1042,303" opacity="0.76"/>
    <rect x="1024" y="358" width="4" height="7" rx="1" opacity="0.76"/>
  </g>
  <g fill="#17332e">
    <polygon points="1098,351 1090,331 1106,331" opacity="0.82"/>
    <polygon points="1098,338 1088,315 1108,315" opacity="0.82"/>
    <polygon points="1098,324 1082,297 1114,297" opacity="0.82"/>
    <rect x="1096" y="351" width="4" height="8" rx="1" opacity="0.82"/>
  </g>
  <g fill="#1a3830">
    <polygon points="1162,350 1154,331 1170,331" opacity="0.70"/>
    <polygon points="1162,337 1152,315 1172,315" opacity="0.70"/>
    <polygon points="1162,323 1147,297 1177,297" opacity="0.70"/>
    <rect x="1160" y="350" width="4" height="8" rx="1" opacity="0.70"/>
  </g>

  <!-- Mist — three layers for atmospheric depth -->
  <path d="M0 286 C180 265,390 270,600 292 C800 316,990 311,1200 278"
        fill="none" stroke="url(#tMist)" stroke-width="24" stroke-linecap="round" opacity="0.92"/>
  <path d="M0 326 C210 308,440 313,660 340 C860 360,1020 355,1200 330"
        fill="none" stroke="url(#tMist)" stroke-width="20" stroke-linecap="round" opacity="0.84"/>
  <path d="M0 352 C160 342,340 346,520 364 C700 382,870 378,1200 356"
        fill="none" stroke="url(#tMist2)" stroke-width="16" stroke-linecap="round" opacity="0.72"/>

  <!-- Caption label -->
  <text x="40" y="52"
        font-family="'JetBrains Mono','Fira Code',monospace"
        font-size="12" fill="#0b7a5c" opacity="0.70" letter-spacing="0.08em">DETECT &#x2192; PROFILE &#x2192; ACT</text>

  <!-- Floating scroll panel -->
  <g filter="url(#tShadow)">
    <rect x="44" y="68" width="1112" height="188" rx="26"
          fill="#ffffff" stroke="#b8ddd0" stroke-width="3.5"/>

    <g clip-path="url(#tPanelClip)">
      <!-- Raked sand horizon lines -->
      <g fill="none" stroke="#d0e8df" stroke-width="1.5" opacity="0.50">
        <path d="M52,84  C320,80  640,86  960,82  C1070,80 1110,84 1148,82"/>
        <path d="M52,97  C320,93  640,99  960,95  C1070,93 1110,97 1148,95"/>
        <path d="M52,110 C320,106 640,112 960,108 C1070,106 1110,110 1148,108"/>
        <path d="M52,123 C320,119 640,125 960,121 C1070,119 1110,123 1148,121"/>
        <path d="M52,136 C320,132 640,138 960,134 C1070,132 1110,136 1148,134"/>
        <path d="M52,149 C320,145 640,151 960,147 C1070,145 1110,149 1148,147"/>
        <path d="M52,162 C320,158 640,164 960,160 C1070,158 1110,162 1148,160"/>
        <path d="M52,175 C320,171 640,177 960,173 C1070,171 1110,175 1148,173"/>
        <path d="M52,188 C320,184 640,190 960,186 C1070,184 1110,188 1148,186"/>
        <path d="M52,201 C320,197 640,203 960,199 C1070,197 1110,201 1148,199"/>
        <path d="M52,214 C320,210 640,216 960,212 C1070,210 1110,214 1148,212"/>
        <path d="M52,227 C320,223 640,229 960,225 C1070,223 1110,227 1148,225"/>
        <path d="M52,240 C320,236 640,242 960,238 C1070,236 1110,240 1148,238"/>
      </g>

      <!-- Mountain path — winding jade stroke, no pipeline feel -->
      <path d="M 80,188
               C 155,188 205,150 252,150
               C 298,150 340,108 378,108
               C 416,108 452,132 492,132
               C 532,132 572,156 612,156
               C 652,156 686,174 726,174
               C 766,174 806,152 846,152
               C 886,152 918,118 956,118
               C 994,118 1024,106 1060,106
               C 1096,106 1124,135 1148,135"
            fill="none" stroke="#0b7a5c" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Ghost trace — light dashed mint, stream-bed rhythm -->
      <path d="M 80,192
               C 155,192 205,154 252,154
               C 298,154 340,112 378,112
               C 416,112 452,136 492,136
               C 532,136 572,160 612,160
               C 652,160 686,178 726,178
               C 766,178 806,156 846,156
               C 886,156 918,122 956,122
               C 994,122 1024,110 1060,110
               C 1096,110 1124,139 1148,139"
            fill="none" stroke="#3fd9a8" stroke-width="1.8"
            stroke-linecap="round" stroke-dasharray="5 13" opacity="0.38"/>

      <!-- Overhanging pine branch — upper-left corner, mountain-pass motif -->
      <g fill="none" stroke="#17332e" stroke-linecap="round" opacity="0.44">
        <path d="M52,78 C72,73 96,70 122,75"  stroke-width="2.8"/>
        <path d="M66,74 C72,66 80,62 90,64"   stroke-width="2.0"/>
        <path d="M84,72 C90,64 100,61 110,64"  stroke-width="1.7"/>
        <path d="M100,73 C106,65 116,62 124,66" stroke-width="1.5"/>
      </g>
      <circle cx="91"  cy="63" r="4" fill="#1a3830" opacity="0.28"/>
      <circle cx="110" cy="62" r="3" fill="#1a3830" opacity="0.23"/>

      <!-- Ten stepping stones — flat natural ellipses, no inner dots, parchment fill -->

      <ellipse cx="80"  cy="188" rx="27" ry="17" fill="#f4f9f7" stroke="#0b7a5c" stroke-width="3.0"/>
      <text x="80"  y="213" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">detect</text>

      <ellipse cx="252" cy="150" rx="24" ry="15" fill="#f4f9f7" stroke="#0b7a5c" stroke-width="3.0"/>
      <text x="252" y="172" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">profile</text>

      <ellipse cx="378" cy="108" rx="23" ry="14" fill="#f5faf8" stroke="#0ea27a" stroke-width="2.8"/>
      <text x="378" y="130" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">scaffold</text>

      <ellipse cx="492" cy="132" rx="22" ry="14" fill="#f5faf8" stroke="#0ea27a" stroke-width="2.8"/>
      <text x="492" y="154" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">validate</text>

      <ellipse cx="612" cy="156" rx="23" ry="15" fill="#f5faf8" stroke="#0ea27a" stroke-width="2.8"/>
      <text x="612" y="178" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">generate</text>

      <ellipse cx="726" cy="174" rx="22" ry="14" fill="#f5faf8" stroke="#0ea27a" stroke-width="2.8"/>
      <text x="726" y="196" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">onboard</text>

      <ellipse cx="846" cy="152" rx="22" ry="14" fill="#f5faf8" stroke="#3fd9a8" stroke-width="2.8"/>
      <text x="846" y="174" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">theme</text>

      <ellipse cx="956" cy="118" rx="22" ry="14" fill="#f5faf8" stroke="#3fd9a8" stroke-width="2.8"/>
      <text x="956" y="139" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">copilot</text>

      <ellipse cx="1060" cy="106" rx="28" ry="16" fill="#f5faf8" stroke="#3fd9a8" stroke-width="2.8"/>
      <text x="1060" y="128" text-anchor="middle"
            font-family="system-ui,-apple-system,sans-serif"
            font-size="9.5" font-weight="600" fill="#17332e">docstring</text>

