<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="mcp-zen-of-docs — MCP Tools Workflow">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#131720"/>
      <stop offset="50%" style="stop-color:#1a2030"/>
      <stop offset="100%" style="stop-color:#222843"/>
    </linearGradient>
    <linearGradient id="tealViolet" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea27a"/>
      <stop offset="100%" style="stop-color:#72e8c4"/>
    </linearGradient>
    <linearGradient id="tealSolid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea27a"/>
      <stop offset="100%" style="stop-color:#0b7a5c"/>
    </linearGradient>
    <linearGradient id="violetSolid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#72e8c4"/>
      <stop offset="100%" style="stop-color:#3fc99d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#0ea27a" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
    <line x1="800" y1="0" x2="800" y2="420"/>
    <line x1="900" y1="0" x2="900" y2="420"/>
    <line x1="1000" y1="0" x2="1000" y2="420"/>
    <line x1="1100" y1="0" x2="1100" y2="420"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#tealViolet)" opacity="0.7"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="420" fill="#0ea27a" opacity="0.3"/>

  <!-- Section label -->
  <text x="40" y="56" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#0ea27a" opacity="0.6" letter-spacing="0.08em">DETECT → PROFILE → ACT</text>

  <!-- Main pipeline: 5 nodes row 1 (left side) -->
  <!-- detect -->
  <rect x="40" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="90" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0ea27a">detect</text>
  <text x="90" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">framework context</text>
  <text x="90" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">+ readiness</text>

  <!-- Arrow 1 -->
  <line x1="141" y1="126" x2="168" y2="126" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="168,122 176,126 168,130" fill="#0ea27a" fill-opacity="0.6"/>

  <!-- profile -->
  <rect x="177" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="227" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0ea27a">profile</text>
  <text x="227" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">authoring profile</text>
  <text x="227" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">+ primitives</text>

  <!-- Arrow 2 -->
  <line x1="278" y1="126" x2="305" y2="126" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="305,122 313,126 305,130" fill="#0ea27a" fill-opacity="0.6"/>

  <!-- scaffold -->
  <rect x="314" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#3fc99d" stroke-width="1.5" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="364" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#72e8c4">scaffold</text>
  <text x="364" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">create + enrich</text>
  <text x="364" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">doc pages</text>

  <!-- Arrow 3 -->
  <line x1="415" y1="126" x2="442" y2="126" stroke="#72e8c4" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="442,122 450,126 442,130" fill="#72e8c4" fill-opacity="0.6"/>

  <!-- validate -->
  <rect x="451" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#3fc99d" stroke-width="1.5" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="501" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#72e8c4">validate</text>
  <text x="501" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">links · structure</text>
  <text x="501" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">quality score</text>

  <!-- Arrow 4 -->
  <line x1="552" y1="126" x2="579" y2="126" stroke="#72e8c4" stroke-width="1.5" stroke-opacity="0.6"/>
  <polygon points="579,122 587,126 579,130" fill="#72e8c4" fill-opacity="0.6"/>

  <!-- generate -->
  <rect x="588" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#3fc99d" stroke-width="1.5" stroke-opacity="0.7" filter="url(#subtleGlow)"/>
  <text x="638" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#72e8c4">generate</text>
  <text x="638" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">SVG · diagrams</text>
  <text x="638" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">reference docs</text>

  <!-- Second row tools with downward connector from row 1 -->
  <!-- Vertical connector from generate -->
  <line x1="638" y1="153" x2="638" y2="200" stroke="#72e8c4" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="638" y1="200" x2="1090" y2="200" stroke="#72e8c4" stroke-width="1" stroke-opacity="0.3"/>

  <!-- onboard (row 2 starts to the right) -->
  <rect x="725" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.5" filter="url(#subtleGlow)"/>
  <text x="775" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0ea27a">onboard</text>
  <text x="775" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">init · boilerplate</text>
  <text x="775" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">pipeline plan</text>

  <!-- theme -->
  <rect x="855" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.5" filter="url(#subtleGlow)"/>
  <text x="905" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0ea27a">theme</text>
  <text x="905" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">CSS · MkDocs</text>
  <text x="905" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">extensions</text>

  <!-- copilot -->
  <rect x="985" y="100" width="100" height="52" rx="8" fill="#1a2030" stroke="#72e8c4" stroke-width="1.5" stroke-opacity="0.5" filter="url(#subtleGlow)"/>
  <text x="1035" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#72e8c4">copilot</text>
  <text x="1035" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">instructions</text>
  <text x="1035" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">agent config</text>

  <!-- docstring -->
  <rect x="725" y="220" width="100" height="52" rx="8" fill="#1a2030" stroke="#72e8c4" stroke-width="1.5" stroke-opacity="0.5" filter="url(#subtleGlow)"/>
  <text x="775" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#72e8c4">docstring</text>
  <text x="775" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">audit · optimize</text>
  <text x="775" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">coverage</text>

  <!-- story -->
  <rect x="855" y="220" width="100" height="52" rx="8" fill="#1a2030" stroke="#72e8c4" stroke-width="1.5" stroke-opacity="0.5" filter="url(#subtleGlow)"/>
  <text x="905" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#72e8c4">story</text>
  <text x="905" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">compose docs</text>
  <text x="905" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">narrative</text>

  <!-- MCP Client label left -->
  <rect x="40" y="220" width="100" height="52" rx="8" fill="#0ea27a" fill-opacity="0.08" stroke="#0ea27a" stroke-width="1" stroke-opacity="0.5"/>
  <text x="90" y="240" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#0ea27a" opacity="0.7">MCP Client</text>
  <text x="90" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">Claude Desktop</text>
  <text x="90" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e">VS Code · Cursor</text>

  <!-- Connector arrow from MCP Client to detect -->
  <line x1="141" y1="246" x2="160" y2="246" stroke="#0ea27a" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="160" y1="246" x2="160" y2="126" stroke="#0ea27a" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="40" y="330" width="12" height="12" rx="3" fill="none" stroke="#0ea27a" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="58" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Detect → Profile phase</text>
  <rect x="210" y="330" width="12" height="12" rx="3" fill="none" stroke="#3fc99d" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="228" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Act phase</text>
  <rect x="340" y="330" width="12" height="12" rx="3" fill="none" stroke="#72e8c4" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="358" y="341" font-family="system-ui, sans-serif" font-size="10" fill="#8b949e">Extended capabilities</text>

  <!-- Bottom label -->
  <text x="1160" y="400" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b949e" opacity="0.5">mcp-zen-of-docs</text>
</svg>
