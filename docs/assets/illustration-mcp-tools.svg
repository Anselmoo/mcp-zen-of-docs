<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-label="mcp-zen-of-docs — MCP Tools as a mountain path through cedar forest">
  <title>MCP Tools Workflow — Mountain Path</title>
  <desc>A mountain landscape with three distant peaks representing the Detect–Profile–Act phases, layered cedar-forest ridges, and drifting mist. A winding stone path threads through a floating scroll panel; ten flat stepping stones along the path name the ten MCP tool groups, rendered in the jade-and-parchment chapter palette.</desc>
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#edf8f4"/>
      <stop offset="58%"  stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#faf6ee"/>
    </linearGradient>
    <linearGradient id="tPeak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#daeee6"/>
      <stop offset="100%" stop-color="#c2dfd4"/>
    </linearGradient>
    <linearGradient id="tRidgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d5ebe3"/>
      <stop offset="100%" stop-color="#bfddd1"/>
    </linearGradient>
    <linearGradient id="tRidgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b7dbcd"/>
      <stop offset="100%" stop-color="#8fc7b5"/>
    </linearGradient>
    <linearGradient id="tRidgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#31584d"/>
      <stop offset="100%" stop-color="#17332e"/>
    </linearGradient>
    <linearGradient id="tMist" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#f5fbf8" stop-opacity="0.76"/>
      <stop offset="54%"  stop-color="#edf8f4" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tMist2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#f0f9f5" stop-opacity="0.62"/>
      <stop offset="70%"  stop-color="#e8f5f0" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14"
                    flood-color="#17332e" flood-opacity="0.10"/>
    </filter>
    <filter id="tHaze" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>
    <clipPath id="tPanelClip">
      <rect x="44" y="68" width="1112" height="188" rx="26"/>
    </clipPath>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="420" rx="30" fill="url(#tSky)"/>

  <!-- Sun disc + halo -->
  <circle cx="1062" cy="94" r="64" fill="#cbe8dc" opacity="0.28"/>
  <circle cx="1062" cy="94" r="36" fill="#e4f5ed" opacity="0.94"/>

  <!-- Distant mountain peaks — one per workflow phase, rendered through atmospheric haze -->
  <g filter="url(#tHaze)" opacity="0.58">
    <path d="M 55,278 L 190,162 L 320,278 Z" fill="url(#tPeak)"/>
    <path d="M 152,186 L 190,162 L 228,194 L 244,230 L 136,230 Z" fill="#eef6f2" opacity="0.90"/>
    <path d="M 438,278 L 594,135 L 748,278 Z" fill="url(#tPeak)" opacity="0.88"/>
    <path d="M 558,160 L 594,135 L 630,163 L 650,216 L 538,216 Z" fill="#eef6f2" opacity="0.84"/>
    <path d="M 820,278 L 948,168 L 1078,278 Z" fill="url(#tPeak)" opacity="0.80"/>
    <path d="M 914,192 L 948,168 L 982,196 L 998,238 L 898,238 Z" fill="#eef6f2" opacity="0.78"/>
  </g>

  <!-- Ridge bands -->
  <path d="M0 281 C133 249,272 249,423 281 C588 315,752 315,920 281 C1033 257,1128 254,1200 265 L1200 420 L0 420 Z"
        fill="url(#tRidgeFar)"/>
  <path d="M0 312 C165 281,308 283,473 317 C638 351,793 351,950 312 C1055 286,1140 288,1200 296 L1200 420 L0 420 Z"
        fill="url(#tRidgeMid)" opacity="0.92"/>
  <path d="M0 357 C173 330,343 333,508 367 C675 401,850 398,1200 349 L1200 420 L0 420 Z"
        fill="url(#tRidgeNear)"/>

