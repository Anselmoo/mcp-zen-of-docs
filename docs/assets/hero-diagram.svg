<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180"
     role="img" aria-label="Detect → Profile → Act — the three-step flow of mcp-zen-of-docs">
  <title>Detect → Profile → Act</title>

  <defs>
    <!-- ── Arrowhead marker ────────────────────────────────────────────── -->
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 Z" fill="#3fd9a8"/>
    </marker>

    <!-- ── Light/dark adaptive styles ────────────────────────────────────
         On dark backgrounds: deep surface boxes with jade borders.
         On light backgrounds: warm ivory with dark ink text.
    ──────────────────────────────────────────────────────────────────────── -->
    <style>
      .box-bg   { fill: #1a2030; }
      .box-edge { stroke: #0ea27a; fill: none; }
      .step-num { fill: #0ea27a; font-family: system-ui, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; opacity: 0.6; }
      .label    { fill: #e4dfd4; font-family: system-ui, sans-serif; font-size: 20px; font-weight: 700; }
      .sublabel { fill: #9c9890; font-family: system-ui, sans-serif; font-size: 12px; }
      .connector { stroke: #3fd9a8; stroke-width: 2; }

      @media (prefers-color-scheme: light) {
        .box-bg   { fill: #f4f1eb; }
        .label    { fill: #2a2522; }
        .sublabel { fill: #7c7267; }
      }
    </style>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════════
       Layout: three 200×110 boxes with 70 px gaps, 30 px side margins
       Box centers Y = 35 + 55 = 90
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- ── Box 1: Detect ───────────────────────────────────────────────── -->
  <rect x="30"  y="35" width="200" height="110" rx="14" class="box-bg"/>
  <rect x="30"  y="35" width="200" height="110" rx="14" class="box-edge" stroke-width="1.5"/>
  <text x="50"  y="58"  class="step-num">01</text>
  <text x="130" y="86"  class="label"    text-anchor="middle">Detect</text>
  <text x="130" y="107" class="sublabel" text-anchor="middle">reads config files</text>

  <!-- ── Arrow 1 → 2 ─────────────────────────────────────────────────── -->
  <line x1="232" y1="90" x2="298" y2="90"
        class="connector" marker-end="url(#arrowHead)"/>

  <!-- ── Box 2: Profile ──────────────────────────────────────────────── -->
  <rect x="300" y="35" width="200" height="110" rx="14" class="box-bg"/>
  <rect x="300" y="35" width="200" height="110" rx="14" class="box-edge" stroke-width="1.5"/>
  <text x="320" y="58"  class="step-num">02</text>
  <text x="400" y="86"  class="label"    text-anchor="middle">Profile</text>
  <text x="400" y="107" class="sublabel" text-anchor="middle">16 primitives mapped</text>

  <!-- ── Arrow 2 → 3 ─────────────────────────────────────────────────── -->
  <line x1="502" y1="90" x2="568" y2="90"
        class="connector" marker-end="url(#arrowHead)"/>

  <!-- ── Box 3: Act ──────────────────────────────────────────────────── -->
  <rect x="570" y="35" width="200" height="110" rx="14" class="box-bg"/>
  <rect x="570" y="35" width="200" height="110" rx="14" class="box-edge" stroke-width="1.5"/>
  <text x="590" y="58"  class="step-num">03</text>
  <text x="670" y="86"  class="label"    text-anchor="middle">Act</text>
  <text x="670" y="107" class="sublabel" text-anchor="middle">correct syntax, always</text>

</svg>
