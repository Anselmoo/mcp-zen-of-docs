<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"
     role="img" aria-label="Zen seal accent">
  <title>Zen seal accent</title>
  <defs>
    <!-- sealRing: dark jade → chapter mint (#3fd9a8) -->
    <linearGradient id="sealRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0b8f6c"/>
      <stop offset="100%" stop-color="#3fd9a8"/>
    </linearGradient>
    <!-- sealFill: light parchment interior matching chapter sky tones -->
    <linearGradient id="sealFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f6fbf9" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#d8efe6" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="46" fill="url(#sealFill)" opacity="0.94"/>
  <circle cx="60" cy="60" r="43" fill="none" stroke="url(#sealRing)" stroke-width="5"/>
  <!-- Enso brushstroke mark — chapter jade primary -->
  <path d="M42 71c7-13 14-29 18-29 6 0 10 18 17 18 4 0 8-3 13-8"
        fill="none" stroke="#0d6f57" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chapter mint accent stroke -->
  <path d="M38 49c8-7 15-10 22-10"
        fill="none" stroke="#3fd9a8" stroke-width="4"
        stroke-linecap="round" opacity="0.9"/>
  <!-- Jade dot node — api-constellation inner dot motif -->
  <circle cx="44" cy="38" r="5" fill="#0ea27a" opacity="0.95"/>
</svg>
