<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"
     role="img" aria-label="mcp-zen-of-docs — Ten MCP tools. Four frameworks. Documentation quality for the AI era.">
  <title>mcp-zen-of-docs social card</title>
  <desc>Open Graph social card. Jade and parchment palette with mountain landscape backdrop and a floating white content panel, matching the chapter visual system.</desc>
  <defs>
    <linearGradient id="panelSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#edf8f4"/>
      <stop offset="58%"  stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#faf6ee"/>
    </linearGradient>
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d5ebe3"/>
      <stop offset="100%" stop-color="#bfddd1"/>
    </linearGradient>
    <linearGradient id="ridgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b7dbcd"/>
      <stop offset="100%" stop-color="#8fc7b5"/>
    </linearGradient>
    <linearGradient id="ridgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#31584d"/>
      <stop offset="100%" stop-color="#17332e"/>
    </linearGradient>
    <linearGradient id="mistBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#f5fbf8" stop-opacity="0.68"/>
      <stop offset="54%"  stop-color="#edf8f4" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#17332e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Sky card — rx=30 matches chapter card convention -->
  <rect width="1200" height="630" rx="30" fill="url(#panelSky)"/>

  <!-- Sun disc + halo, upper-right (chapter motif) -->
  <circle cx="1020" cy="148" r="72" fill="#cbe8dc" opacity="0.34"/>
  <circle cx="1020" cy="148" r="48" fill="#e4f5ed" opacity="0.96"/>

  <!-- Ridge bands in lower third (960×320→1200×630: scaleX=1.25, scaleY=1.969) -->
  <path d="M0 421 C133 374,272 374,423 421 C588 473,752 473,920 421 C1033 385,1128 381,1200 398 L1200 630 L0 630 Z"
        fill="url(#ridgeFar)"/>
  <path d="M0 469 C165 421,308 424,473 471 C638 526,793 526,950 469 C1057 430,1142 434,1200 444 L1200 630 L0 630 Z"
        fill="url(#ridgeMid)" opacity="0.92"/>
  <path d="M0 535 C173 495,343 499,508 551 C675 601,850 597,1200 524 L1200 630 L0 630 Z"
        fill="url(#ridgeNear)"/>

  <!-- Mist strokes over ridges -->
  <path d="M65 434 C240 416,390 419,540 450 C690 481,875 479,1095 440"
        fill="none" stroke="url(#mistBand)" stroke-width="26" stroke-linecap="round"/>
  <path d="M102 508 C275 494,450 498,620 530 C802 562,960 560,1120 522"
        fill="none" stroke="url(#mistBand)" stroke-width="20" stroke-linecap="round" opacity="0.9"/>

  <!-- Floating content layer — feDropShadow identical to chapter content groups -->
  <g filter="url(#softShadow)">

    <!-- Enso brand emblem — sits above the white content panel as a logo mark.
         Mirrors zen-icon.svg motif: incomplete enso arc (zen imperfection) +
         doc lines below. Like the jade hammer in contributing-workbench, it
         "announces" the panel below without being contained by it. -->
    <path d="M98 44 C82 42,70 54,70 70 C70 86,82 98,98 98 C114 98,126 86,126 70 C126 58,120 49,112 46"
          fill="none" stroke="#0ea27a" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="88" y1="66" x2="108" y2="66" stroke="#0b7a5c" stroke-width="2" stroke-linecap="round"/>
    <line x1="88" y1="73" x2="108" y2="73" stroke="#0b7a5c" stroke-width="2" stroke-linecap="round"/>
    <line x1="88" y1="80" x2="100" y2="80" stroke="#3fd9a8" stroke-width="2"
          stroke-linecap="round" opacity="0.7"/>

    <!-- White content panel card
         Enclosing rectangle behind all text elements.
         philosophy-garden / contributing-workbench convention:
         fill=#ffffff stroke=#b8ddd0 stroke-width=4 rx=32. -->
    <rect x="52" y="148" width="1096" height="248" rx="32"
          fill="#ffffff" stroke="#b8ddd0" stroke-width="4"/>

    <!-- Main title — dark forest heading on white panel -->
    <text x="84" y="234"
          font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
          font-size="72" font-weight="700" fill="#17332e" letter-spacing="-0.025em">mcp-zen-of-docs</text>

    <!-- Subtitle — secondary forest text -->
    <text x="84" y="287"
          font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
          font-size="26" fill="#31584d">Ten MCP tools. Four frameworks.</text>

    <!-- Separator — jade mist-border miniature, inset to panel margins -->
    <line x1="84" y1="328" x2="1116" y2="328" stroke="#b8ddd0" stroke-width="2"/>

    <!-- Tagline — accent jade, uppercase tracking (chapter label convention) -->
    <text x="84" y="364"
          font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
          font-size="18" font-weight="600" fill="#0b7a5c" letter-spacing="0.06em">DOCUMENTATION · QUALITY · AI-NATIVE</text>

  </g>
</svg>
