  <path d="M88 506 C214 488, 332 494, 466 522 C596 548, 702 548, 836 520" fill="none" stroke="#eff6f1" stroke-opacity="0.08" stroke-width="18" stroke-linecap="round" filter="url(#mistBlur)"/>
