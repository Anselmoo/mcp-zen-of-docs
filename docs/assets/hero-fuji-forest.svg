<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640" role="img" aria-label="Mount Fuji above layered cedar forest and drifting mist in a calm forest palette">
  <title>Mount Fuji above cedar forest and mist</title>
  <desc>A layered night landscape with Mount Fuji, drifting mist, and cedar silhouettes rendered in the same jade-led visual system used across the chapter illustrations.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1318"/>
      <stop offset="34%" stop-color="#162026"/>
      <stop offset="72%" stop-color="#1a2830"/>
      <stop offset="100%" stop-color="#202630"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.72" cy="0.18" r="0.22">
      <stop offset="0%" stop-color="#dff3ea" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#9fd7c1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9fd7c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mistGlow" cx="0.42" cy="0.48" r="0.42">
      <stop offset="0%" stop-color="#dbe8e2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dbe8e2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde6e4"/>
      <stop offset="42%" stop-color="#9eaba9"/>
      <stop offset="78%" stop-color="#667678"/>
      <stop offset="100%" stop-color="#49565d"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfc"/>
      <stop offset="100%" stop-color="#dfe7e4"/>
    </linearGradient>
    <linearGradient id="snowShadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf3f1" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#b8c6c2" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#304944"/>
      <stop offset="100%" stop-color="#20322f"/>
    </linearGradient>
    <linearGradient id="ridgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22332d"/>
      <stop offset="60%" stop-color="#162621"/>
      <stop offset="100%" stop-color="#101a18"/>
    </linearGradient>
    <linearGradient id="ridgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e4b42"/>
      <stop offset="54%" stop-color="#21362f"/>
      <stop offset="100%" stop-color="#172925"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbe8e2" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#dbe8e2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="treeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11231e"/>
      <stop offset="100%" stop-color="#0b1513"/>
    </linearGradient>
    <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <filter id="mistBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="18" />
    </filter>
  </defs>

  <rect width="880" height="640" fill="url(#sky)"/>
  <rect width="880" height="640" fill="url(#moonGlow)"/>
  <rect width="880" height="640" fill="url(#mistGlow)"/>

  <circle cx="640" cy="118" r="44" fill="#eaf5ef" opacity="0.92"/>
  <circle cx="640" cy="118" r="78" fill="#d4eee2" opacity="0.1" filter="url(#softBlur)"/>

  <path d="M278 392 L440 116 L602 392 Z" fill="url(#fuji)"/>
  <path d="M392 196 L440 116 L487 197 L520 255 L360 255 Z" fill="url(#snow)"/>
  <path d="M391 198 L440 136 L486 198 L506 240 L374 240 Z" fill="url(#snowShadow)" opacity="0.42"/>
  <path d="M438 116 L454 164 L425 164 Z" fill="#eef5f3" opacity="0.7"/>
