    <path d="M386 640 L404 566 L414 508 L436 640 Z"/>
    <path d="M428 640 L446 580 L460 470 L482 640 Z"/>
    <path d="M470 640 L488 546 L502 496 L522 640 Z"/>
    <path d="M514 640 L532 576 L544 516 L566 640 Z"/>
