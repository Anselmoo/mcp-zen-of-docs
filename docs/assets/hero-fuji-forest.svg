    <path d="M244 640 l18 -104 l20 -76 l28 180 z"/>
    <path d="M612 640 l18 -74 l16 -58 l22 132 z"/>
    <path d="M660 640 l18 -92 l18 -78 l26 170 z"/>
    <path d="M718 640 l18 -110 l20 -74 l28 184 z"/>
    <path d="M786 640 l16 -84 l16 -58 l20 142 z"/>
