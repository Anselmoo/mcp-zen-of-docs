<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640" role="img" aria-label="Mount Fuji above layered cedar forest and drifting mist in a calm parchment-and-jade palette">
  <title>Mount Fuji above cedar forest and mist</title>
  <desc>A light chapter-style Fuji landscape with parchment sky, layered green ridges, mist bands, and cedar silhouettes for the homepage hero.</desc>
  <defs>
    <linearGradient id="panelSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf8f4"/>
      <stop offset="58%" stop-color="#f7fbf8"/>
      <stop offset="100%" stop-color="#faf6ee"/>
    </linearGradient>
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d5ebe3"/>
      <stop offset="100%" stop-color="#bfddd1"/>
    </linearGradient>
    <linearGradient id="ridgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7dbcd"/>
      <stop offset="100%" stop-color="#8fc7b5"/>
    </linearGradient>
    <linearGradient id="ridgeNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#31584d"/>
      <stop offset="100%" stop-color="#17332e"/>
    </linearGradient>
    <linearGradient id="mistBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="18%" stop-color="#f5fbf8" stop-opacity="0.68"/>
      <stop offset="54%" stop-color="#edf8f4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fujiBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef4f2"/>
      <stop offset="58%" stop-color="#c7d7d4"/>
      <stop offset="100%" stop-color="#93a8a8"/>
    </linearGradient>
    <linearGradient id="fujiSnow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5efeb"/>
    </linearGradient>
  </defs>

  <rect width="880" height="640" fill="url(#panelSky)"/>
  <circle cx="664" cy="124" r="72" fill="#cbe8dc" opacity="0.36"/>
  <circle cx="664" cy="124" r="40" fill="#e4f5ed" opacity="0.98"/>

  <path d="M0 398 C112 364, 212 362, 320 398 C432 434, 534 432, 654 396 C746 368, 816 368, 880 378 L880 640 L0 640 Z" fill="url(#ridgeFar)"/>
  <path d="M0 446 C122 404, 236 408, 350 446 C468 486, 584 482, 706 442 C792 414, 846 418, 880 426 L880 640 L0 640 Z" fill="url(#ridgeMid)" opacity="0.92"/>
  <path d="M0 520 C126 470, 258 468, 386 520 C516 572, 652 566, 880 498 L880 640 L0 640 Z" fill="url(#ridgeNear)"/>

  <path d="M256 392 L440 118 L626 392 Z" fill="url(#fujiBody)"/>
  <path d="M380 214 L440 118 L500 216 L534 268 L346 268 Z" fill="url(#fujiSnow)"/>
  <path d="M438 118 L456 170 L424 170 Z" fill="#f7fbf8" opacity="0.78"/>

