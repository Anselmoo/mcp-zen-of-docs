<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" role="img" aria-label="mcp-zen-of-docs — Universal Documentation Quality MCP Server">
  <defs>
    <!-- Dark canvas base -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#131720"/>
      <stop offset="50%" style="stop-color:#1a2030"/>
      <stop offset="100%" style="stop-color:#222843"/>
    </linearGradient>
    <!-- Title gradient: teal → violet -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#72e8c4"/>
      <stop offset="40%" style="stop-color:#0ea27a"/>
      <stop offset="100%" style="stop-color:#72e8c4"/>
    </linearGradient>
    <!-- Teal glow left -->
    <radialGradient id="glowLeft" cx="25%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0ea27a;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#0ea27a;stop-opacity:0"/>
    </radialGradient>
    <!-- Violet glow right -->
    <radialGradient id="glowRight" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3fc99d;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#3fc99d;stop-opacity:0"/>
    </radialGradient>
    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text glow -->
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="420" fill="url(#bgGrad)"/>
  <!-- Ambient glows -->
  <rect width="1440" height="420" fill="url(#glowLeft)"/>
  <rect width="1440" height="420" fill="url(#glowRight)"/>

  <!-- Grid lines — horizontal -->
  <g stroke="#0ea27a" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="60" x2="1440" y2="60"/>
    <line x1="0" y1="120" x2="1440" y2="120"/>
    <line x1="0" y1="180" x2="1440" y2="180"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="360" x2="1440" y2="360"/>
  </g>
  <!-- Grid lines — vertical -->
  <g stroke="#0ea27a" stroke-opacity="0.04" stroke-width="1">
    <line x1="120" y1="0" x2="120" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/>
    <line x1="840" y1="0" x2="840" y2="420"/>
    <line x1="960" y1="0" x2="960" y2="420"/>
    <line x1="1080" y1="0" x2="1080" y2="420"/>
    <line x1="1200" y1="0" x2="1200" y2="420"/>
    <line x1="1320" y1="0" x2="1320" y2="420"/>
  </g>

  <!-- Circuit-style nodes at grid intersections — teal -->
  <g fill="#0ea27a" filter="url(#nodeGlow)">
    <circle cx="120" cy="120" r="3" opacity="0.6"/>
    <circle cx="360" cy="60" r="2" opacity="0.4"/>
    <circle cx="240" cy="240" r="3" opacity="0.5"/>
    <circle cx="480" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="600" cy="300" r="2" opacity="0.3"/>
    <circle cx="1320" cy="120" r="3" opacity="0.6"/>
    <circle cx="1200" cy="60" r="2" opacity="0.4"/>
    <circle cx="1080" cy="240" r="3" opacity="0.5"/>
    <circle cx="960" cy="180" r="2.5" opacity="0.5"/>
    <circle cx="840" cy="300" r="2" opacity="0.3"/>
  </g>
  <!-- Violet accent nodes -->
  <g fill="#3fc99d" filter="url(#nodeGlow)">
    <circle cx="360" cy="300" r="2.5" opacity="0.5"/>
    <circle cx="120" cy="360" r="2" opacity="0.4"/>
    <circle cx="1080" cy="360" r="2.5" opacity="0.5"/>
    <circle cx="1320" cy="300" r="2" opacity="0.4"/>
    <circle cx="720" cy="60" r="3" opacity="0.4"/>
  </g>

  <!-- Connecting circuit lines left cluster -->
  <g stroke="#0ea27a" stroke-opacity="0.15" stroke-width="1" fill="none">
    <path d="M120 120 L240 120 L240 240"/>
    <path d="M360 60 L480 60 L480 180"/>
    <path d="M240 240 L360 240 L360 300"/>
  </g>
  <!-- Connecting circuit lines right cluster -->
  <g stroke="#0ea27a" stroke-opacity="0.15" stroke-width="1" fill="none">
    <path d="M1320 120 L1200 120 L1200 60"/>
    <path d="M1080 240 L960 240 L960 180"/>
    <path d="M1200 240 L1080 240"/>
  </g>
  <!-- Violet connection -->
  <g stroke="#3fc99d" stroke-opacity="0.12" stroke-width="1" fill="none">
    <path d="M360 300 L360 360 L120 360"/>
    <path d="M1080 360 L1320 360 L1320 300"/>
  </g>

  <!-- Top border accent line -->
  <line x1="0" y1="0" x2="1440" y2="0" stroke="#0ea27a" stroke-opacity="0.4" stroke-width="2"/>
  <!-- Bottom border accent line -->
  <line x1="0" y1="418" x2="1440" y2="418" stroke="#0ea27a" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Version / status badge -->
  <rect x="664" y="100" width="112" height="24" rx="12" fill="#0ea27a" fill-opacity="0.12" stroke="#0ea27a" stroke-opacity="0.4" stroke-width="1"/>
  <text x="720" y="116" text-anchor="middle" dominant-baseline="middle"
    font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" font-weight="600"
    fill="#0ea27a" letter-spacing="0.08em">v0.1 · MCP</text>

  <!-- Main title — gradient fill with glow -->
  <text x="720" y="200" text-anchor="middle" dominant-baseline="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-size="76" font-weight="800" letter-spacing="-0.03em"
    fill="url(#titleGrad)" filter="url(#textGlow)">mcp-zen-of-docs</text>

  <!-- Subtitle -->
  <text x="720" y="258" text-anchor="middle" dominant-baseline="middle"
    font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="400"
    fill="#c9d1d9" opacity="0.8" letter-spacing="0.02em">Universal Documentation Quality · Write less. Explain more. Validate always.</text>

  <!-- Stats strip separator -->
  <line x1="400" y1="300" x2="1040" y2="300" stroke="#0ea27a" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Stats strip -->
  <g font-family="'Inter', system-ui, sans-serif" text-anchor="middle">
    <!-- 4 Frameworks -->
    <text x="500" y="330" font-size="26" font-weight="800" fill="#0ea27a" dominant-baseline="middle">4</text>
    <text x="500" y="355" font-size="11" font-weight="500" fill="#8b949e" dominant-baseline="middle" letter-spacing="0.08em" text-transform="uppercase">FRAMEWORKS</text>
    <!-- separator dot -->
    <circle cx="580" cy="340" r="2" fill="#0ea27a" opacity="0.3"/>
    <!-- 16 Primitives -->
    <text x="660" y="330" font-size="26" font-weight="800" fill="#0ea27a" dominant-baseline="middle">16</text>
    <text x="660" y="355" font-size="11" font-weight="500" fill="#8b949e" dominant-baseline="middle" letter-spacing="0.08em">PRIMITIVES</text>
    <!-- separator dot -->
    <circle cx="740" cy="340" r="2" fill="#3fc99d" opacity="0.4"/>
    <!-- 530+ Tests -->
    <text x="820" y="330" font-size="26" font-weight="800" fill="#72e8c4" dominant-baseline="middle">530+</text>
    <text x="820" y="355" font-size="11" font-weight="500" fill="#8b949e" dominant-baseline="middle" letter-spacing="0.08em">TESTS</text>
    <!-- separator dot -->
    <circle cx="900" cy="340" r="2" fill="#0ea27a" opacity="0.3"/>
    <!-- MCP Protocol -->
    <text x="980" y="330" font-size="26" font-weight="800" fill="#72e8c4" dominant-baseline="middle">MCP</text>
    <text x="980" y="355" font-size="11" font-weight="500" fill="#8b949e" dominant-baseline="middle" letter-spacing="0.08em">PROTOCOL</text>
  </g>

  <!-- Corner decoration — bottom left -->
  <g stroke="#0ea27a" stroke-opacity="0.2" fill="none" stroke-width="1">
    <rect x="20" y="390" width="60" height="20" rx="3"/>
    <text x="50" y="404" text-anchor="middle" dominant-baseline="middle"
      font-family="monospace" font-size="9" fill="#0ea27a" opacity="0.5">detect→act</text>
  </g>
  <!-- Corner decoration — bottom right -->
  <g stroke="#3fc99d" stroke-opacity="0.2" fill="none" stroke-width="1">
    <rect x="1360" y="390" width="60" height="20" rx="3"/>
    <text x="1390" y="404" text-anchor="middle" dominant-baseline="middle"
      font-family="monospace" font-size="9" fill="#72e8c4" opacity="0.5">profile</text>
  </g>
</svg>
